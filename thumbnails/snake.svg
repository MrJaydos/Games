<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 140">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="260" height="140" fill="#060e06"/>
  <g stroke="#0d1a0d" stroke-width="0.8">
    <line x1="20" y1="0" x2="20" y2="140"/><line x1="40" y1="0" x2="40" y2="140"/>
    <line x1="60" y1="0" x2="60" y2="140"/><line x1="80" y1="0" x2="80" y2="140"/>
