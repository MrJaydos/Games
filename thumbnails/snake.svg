  <!-- Body (tail → head) -->
  <rect x="161" y="81" width="18" height="18" rx="4" fill="#0f5c1f"/>
  <rect x="141" y="81" width="18" height="18" rx="4" fill="#156826"/>
  <rect x="121" y="81" width="18" height="18" rx="4" fill="#1a752c"/>
  <rect x="101" y="81" width="18" height="18" rx="4" fill="#1f8233"/>
  <rect x="81"  y="81" width="18" height="18" rx="4" fill="#278f3a"/>
  <rect x="81"  y="61" width="18" height="18" rx="4" fill="#2e9e42"/>
  <rect x="101" y="61" width="18" height="18" rx="4" fill="#34ad49"/>
  <rect x="121" y="61" width="18" height="18" rx="4" fill="#39be50"/>
  <!-- Head (glowing) -->
  <rect x="141" y="61" width="18" height="18" rx="4" fill="#3ed458" filter="url(#g)"/>
  <circle cx="148" cy="67" r="2" fill="#060e06"/>
  <circle cx="155" cy="67" r="2" fill="#060e06"/>
  <!-- Food -->
  <circle cx="209" cy="49" r="7" fill="#a00000" filter="url(#g)"/>
