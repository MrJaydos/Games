    <line x1="180" y1="0" x2="180" y2="140"/><line x1="200" y1="0" x2="200" y2="140"/>
    <line x1="220" y1="0" x2="220" y2="140"/><line x1="240" y1="0" x2="240" y2="140"/>
    <line x1="0" y1="20" x2="260" y2="20"/><line x1="0" y1="40" x2="260" y2="40"/>
    <line x1="0" y1="60" x2="260" y2="60"/><line x1="0" y1="80" x2="260" y2="80"/>
    <line x1="0" y1="100" x2="260" y2="100"/><line x1="0" y1="120" x2="260" y2="120"/>
