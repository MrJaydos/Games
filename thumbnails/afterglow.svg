<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 140">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06050e"/>
      <stop offset="100%" stop-color="#0e0c1c"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="260" height="140" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="22"  cy="12" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="58"  cy="25" r="0.7" fill="white" opacity="0.30"/>
  <circle cx="92"  cy="8"  r="1.0" fill="white" opacity="0.50"/>
  <circle cx="142" cy="20" r="0.6" fill="white" opacity="0.30"/>
  <circle cx="198" cy="11" r="0.8" fill="white" opacity="0.40"/>
  <circle cx="238" cy="22" r="0.5" fill="white" opacity="0.30"/>
  <circle cx="70"  cy="38" r="0.5" fill="white" opacity="0.20"/>
  <circle cx="175" cy="32" r="0.6" fill="white" opacity="0.20"/>
  <!-- Ground -->
  <rect x="0"   y="112" width="260" height="28" fill="#12102a"/>
  <rect x="0"   y="110" width="260" height="3"  fill="#1c193a"/>
  <!-- Platform 1 -->
  <rect x="20"  y="85"  width="88"  height="14" rx="2" fill="#12102a"/>
  <rect x="20"  y="83"  width="88"  height="3"  rx="1" fill="#1c193a"/>
  <!-- Platform 2 -->
  <rect x="172" y="62"  width="64"  height="14" rx="2" fill="#12102a"/>
  <rect x="172" y="60"  width="64"  height="3"  rx="1" fill="#1c193a"/>
  <!-- Speed trail -->
  <line x1="10" y1="78" x2="165" y2="78" stroke="url(#trail)" stroke-width="3"/>
  <line x1="20" y1="82" x2="160" y2="82" stroke="url(#trail)" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="74" x2="155" y2="74" stroke="url(#trail)" stroke-width="1"   opacity="0.3"/>
  <!-- Character -->
  <rect x="164" y="73" width="10" height="12" rx="2" fill="#ff6b35" filter="url(#glow)"/>
  <circle cx="169" cy="79" r="18" fill="#ff6b35" opacity="0.07"/>
</svg>
